server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Don't cache config.js or index.html — config.js is regenerated per
    # container start, and index.html references the hashed asset bundle.
    location = /config.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Hashed JS/CSS bundles can be cached aggressively.
    location ~* \.(?:js|css|svg|png|jpg|jpeg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA fallback: any unknown path serves index.html so React Router
    # can handle client-side routes like /orders/3 on a hard refresh.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
